# ==================== 基本配置 ====================
# HTTP/SOCKS5 混合代理端口
mixed-port: 7890

# 允许 IPv6 流量
ipv6: true

# 允许局域网连接 (谨慎开启，可能存在安全风险)
allow-lan: false

# 规则模式：Rule（规则） / Global（全局代理）/ Direct（全局直连）
mode: rule

# 设置日志输出级别 (默认级别：silent)。可选：silent / error / warning / info / debug
log-level: info

# Clash 的 RESTful API 端口 (用于 Dashboard 或其他管理工具)
external-controller: '127.0.0.1:9090'

# GeoIP 和 Geosite 数据文件配置 (推荐开启并使用最新数据)
geodata-mode: true
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  # asn: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/asn.dat" # 如果需要 AS 规则
  # mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb" # 如果需要更高级的 GeoIP 数据库

# 流量嗅探器配置 (推荐开启，优化规则匹配)
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880, 8000, 8081, 8090] # 增加常见 HTTP 端口
      override-destination: true
    TLS:
      ports: [443, 8443, 465, 587, 993, 995] # 增加常见 HTTPS/邮件加密端口
    QUIC:
      ports: [443, 8443] # 嗅探 QUIC 流量
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.apple.com'
    - '+.qq.com' # 跳过一些国内大厂，减少误判
    - '+.tencent.com'
    - '+.baidu.com'
    - '+.aliyuncs.com'
    - '+.jd.com'
    - 'local.pt' # 常见内网PT站跳过，避免sniff导致解析问题

# DNS 配置 (核心优化部分，抗污染，分流解析)
dns:
  enable: true
  listen: :1053
  ipv6: true
  # redir-host: 将被代理的域名解析为代理服务器 IP，提高解析速度，并配合规则使用。
  # fake-ip: 生成虚假 IP，所有流量都走 Clash 内部 DNS，更彻底地防止 DNS 污染。
  # 对于追求极致抗污染和准确性，推荐 fake-ip。此处保持 redir-host，更通用。
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16 # fake-ip 模式下生效，为假 IP 分配一个私有网段
  fake-ip-filter: # fake-ip 模式下，这些域名不会被转换为假 IP，而是真实解析
    - "+.lan"
    - "+.local"
    - "time.windows.com"
    - "time.nist.gov"
    - "ntp.org"
    - "pool.ntp.org"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "time.g0v.tw"
    - "time1.cloud.tencent.com"
    - "time.cloudflare.com"
    - "time.pool.aliyun.com"
    - "ntp.aliyun.com"
    - "stdtime.gov.hk"
    - "stdtime.gov.cn"
    - "ntp.ntsc.ac.cn"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "xboxlive.com"
    - "*.xboxlive.com"
    - "msftconnecttest.com"
    - "www.msftconnecttest.com"
    - "www.apple.com"
    - "www.baidu.com"
    - "connectivitycheck.platform.hicloud.com"
    - "connectivitycheck.platform.catt.cn"
    - "connectivitycheck.platform.miui.com"
    - "connectivitycheck.android.com"
    - "clients3.google.com"

  # 主要上游 DNS 服务器
  nameserver:
    - 223.5.5.5 # 阿里云公共 DNS
    - 114.114.114.114 # 114DNS
    - system # 使用系统默认 DNS (可能会被污染，通常放在最后或不用)

  # 备用 DNS 服务器 (抗 DNS 污染，解析境外域名)
  fallback:
    - 1.1.1.1 # Cloudflare DNS
    - 8.8.8.8 # Google Public DNS
    - 9.9.9.9 # Quad9 DNS (隐私友好)
    - 76.76.2.0 # AdGuard DNS (广告拦截，部分地区可能有延迟)

  # 特定域名使用特定 DNS (规则匹配顺序优先于通用 nameserver/fallback)
  # domain-rules:
  #   - 'geosite:cn,223.5.5.5' # 中国大陆网站使用阿里云DNS
  #   - 'geosite:gfw,8.8.8.8' # 被墙网站使用Google DNS
  #   - 'DOMAIN-SUFFIX,google.com,8.8.8.8'

  # DNS 代理 (如果需要)
  # proxy-server-lookup: true

# 全局客户端指纹 (用于伪装客户端，减少被识别风险)
global-client-fingerprint: chrome

# TCP 并发连接 (提升性能)
tcp-concurrent: true

# 统一延迟测试 (解决多节点延迟测试不准确问题)
unified-delay: true

# 代理节点列表 (由外部订阅或手动添加)
proxies: []

# ==================== 代理组配置 ====================
proxy-groups:
  - name: 🚀 选择代理
    type: select
    proxies:
      - ♻ 自动选择
      - 🔰 延迟最低
      - ✅ 手动选择
      - 🗺️ 选择地区 # 保留此行，用户可以通过“选择代理”进入“选择地区”
      - DIRECT # 兜底直连选项，以防万一

  - name: ♻ 自动选择
    type: fallback
    url: https://www.gstatic.com/generate_204 # 常用测速地址，Google 旗下
    interval: 300
    lazy: true # 延迟测试，在需要时才开始测速
    proxies: [] # 代理节点将由订阅自动填充

  - name: 🔰 延迟最低
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50 # 延迟容忍度，单位 ms，可根据实际情况调整
    proxies: [] # 代理节点将由订阅自动填充

  - name: ✅ 手动选择
    type: select
    proxies: [] # 代理节点将由订阅自动填充

  - name: 🌐 突破锁区
    type: select
    proxies:
      - 🚀 选择代理 # 优先走代理
      - DIRECT # 备用直连

  - name: ❓ 疑似国内
    type: select
    proxies:
      - DIRECT # 优先直连
      - 🚀 选择代理 # 备用代理
      - REJECT # 如果以上都无效，可以考虑拒绝

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 选择代理 # 未匹配规则的流量，优先走代理
      - DIRECT # 备用直连

  - name: 🚨 病毒网站
    type: select
    proxies:
      - REJECT # 病毒网站直接拒绝
      - DIRECT # 备用直连，防止误杀导致正常访问受阻

  - name: ⛔ 广告拦截
    type: select
    proxies:
      - REJECT # 广告直接拒绝
      - DIRECT # 备用直连

  - name: 🗺️ 选择地区
    type: select
    proxies:
      - 🇨🇳 中国大陆 # 示例：如果代理节点有 Geo 标签，可以这样分类
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🌍 全球节点 # 兜底选项
      # - 🚀 选择代理 # <<<<<<<<<<<<<<<< 移除此行，解决循环引用！
      # 现在，从“选择地区”组中，您只能选择具体的地区节点或“全球节点”，不能再返回到“选择代理”组，从而避免了循环。


  # ==================== 流媒体分流组 (按需添加，通常根据节点能力和地区) ====================
  - name: 📺 Netflix
    type: select
    proxies:
      - 🇯🇵 日本节点 # 优先选择Netflix支持的地区节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🚀 选择代理 # 兜底到通用代理组

  - name: 🎬 Disney+
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🚀 选择代理

  - name: 🎥 HBO Max
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🚀 选择代理

  - name: 🎵 Spotify
    type: select
    proxies:
      - 🇸🇬 新加坡节点 # 通常亚洲地区节点表现较好
      - 🇺🇸 美国节点
      - 🚀 选择代理

  # ==================== 游戏分流组 (按需添加) ====================
  - name: 🎮 Steam
    type: select
    proxies:
      - DIRECT # 国内 Steam 商店通常直连更快
      - 🇭🇰 香港节点 # 部分地区可能有特殊需求
      - 🚀 选择代理

  - name: 🎮 Nintendo
    type: select
    proxies:
      - 🇯🇵 日本节点 # 优先选择日服节点
      - 🇺🇸 美国节点
      - 🚀 选择代理

  - name: 🎮 PlayStation
    type: select
    proxies:
      - 🇭🇰 香港节点 # 优先选择港服节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🚀 选择代理

# ==================== 规则配置 ====================
rules:
  # ==================== 策略优先级：拒绝 > 直连 > 代理 ====================
  # 最具体的规则放在最前面

  # === 恶意/广告/挖矿/跟踪器拦截 ===
  - DOMAIN-KEYWORD,dongtaiwang,REJECT
  - DOMAIN-KEYWORD,porn,⛔ 广告拦截 # 常见的成人内容关键词
  - DOMAIN-KEYWORD,js96110,⛔ 广告拦截 # 江苏反诈推广，恶意封禁
  - DOMAIN-KEYWORD,adservice,⛔ 广告拦截
  - DOMAIN-KEYWORD,analytics,⛔ 广告拦截
  - DOMAIN-KEYWORD,tracking,⛔ 广告拦截
  - DOMAIN-KEYWORD,googlead,⛔ 广告拦截
  - DOMAIN-KEYWORD,googlesyndication,⛔ 广告拦截
  - DOMAIN-KEYWORD,doubleclick,⛔ 广告拦截
  - DOMAIN-KEYWORD,facebook-ad,⛔ 广告拦截
  - DOMAIN-SUFFIX,googletagmanager.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,admob.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,ads.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,ads.google.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,adsbdfs.heytapimage.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,adsfs.heytapimage.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,img-c.heytapimage.com,⛔ 广告拦截
  - DOMAIN-SUFFIX,app-measurement.com,⛔ 广告拦截 # Google Analytics
  - DOMAIN-SUFFIX,crashlytics.com,⛔ 广告拦截 # App 崩溃分析 (取消注释则屏蔽)
  - DOMAIN-SUFFIX,flurry.com,⛔ 广告拦截 # 移动应用分析
  - DOMAIN-SUFFIX,umeng.com,⛔ 广告拦截 # 友盟统计
  - DOMAIN-SUFFIX,sensorsdata.cn,⛔ 广告拦截 # 神策数据
  - DOMAIN-SUFFIX,pangle.io,⛔ 广告拦截 # 字节跳动广告联盟

  # 应急响应：BootCDN/Staticfile 被投毒！ (务必拒绝)
  - DOMAIN,cdn.bootcss.com,🚨 病毒网站
  - DOMAIN,cdn.bootcdn.net,🚨 病毒网站
  - DOMAIN,cdn.staticfile.net,🚨 病毒网站
  - DOMAIN,cdn.staticfile.org,🚨 病毒网站
  - DOMAIN-SUFFIX,polyfill.io,🚨 病毒网站
  - DOMAIN,search.kiwibrowser.org,🚨 病毒网站
  - DOMAIN-SUFFIX,kiwibrowser.org,⛔ 广告拦截
  - DOMAIN-KEYWORD,kiwisearchservices,🚨 病毒网站

  # 已知失效或有害的域名
  - DOMAIN-SUFFIX,jsdelivr.us,REJECT # 已无服务或被恶意占用

  # === 本地网络与私有地址 ===
  - DOMAIN-KEYWORD,announce,DIRECT # PT 站做种announce
  - DOMAIN-KEYWORD,torrent,DIRECT
  - DOMAIN-KEYWORD,tracker,DIRECT
  - DOMAIN-SUFFIX,smtp,DIRECT # 邮件发送协议
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,arpa,DIRECT
  - DOMAIN,localhost,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve # 私有网络地址
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve # 本地回环地址
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve # CGNAT 地址

  # === 国内网站 直连规则 (优先处理，确保速度) ===
