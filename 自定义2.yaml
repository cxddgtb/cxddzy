###############################################################################
#                    🚀 Clash 终极无敌最强最终版配置                         #
#                     Ultimate Clash Configuration v10.0                     #
###############################################################################

# ==================== 基础设置 ====================
port: 0
socks-port: 0
redir-port: 0
mixed-port: 7890
tproxy-port: 7895
allow-lan: true
bind-address: '*'
mode: rule
log-level: debug
ipv6: true
external-controller: 0.0.0.0:9090
external-ui: dashboard
secret: ""
experimental:
  ignore-resolve-fail: true
  sniff-tls-sni: true

# ==================== 高级功能设置 ====================
profile:
  store-selected: true
  store-fake-ip: true
  tracing: true

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - 8.8.8.8
    - 1.1.1.1
    - 208.67.222.222
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - 208.67.222.222
    - tls://1.1.1.1:853
    - tls://dns.google:853
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "google.com"
      - "facebook.com"
      - "youtube.com"
      - "github.com"

tun:
  enable: true
  stack: system
  dns-hijack:
    - 8.8.8.8:53
    - 198.18.0.2:53
  auto-route: true
  auto-detect-interface: true

# ==================== 多订阅源支持 ====================
proxy-providers:
  
  # 主订阅源
  primary:
    type: http
    url: "https://github.com/cxddgtb/cxddzy/raw/refs/heads/master/list.meta.yml"
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
    path: ./proxy_providers/primary.yaml
    force-update: true
    filter: "^(?!.*(过期|维护|测试|垃圾|慢速)).*$"
  
  # 备用订阅源1
  backup1:
    type: http
    url: ""  # 可添加备用订阅URL
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    path: ./proxy_providers/backup1.yaml
    force-update: true
  
  # 备用订阅源2
  backup2:
    type: http
    url: ""  # 可添加备用订阅URL
    interval: 7200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    path: ./proxy_providers/backup2.yaml
    force-update: true
  
  # 静态节点（手动添加）
  static:
    type: file
    path: ./proxy_providers/static.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

