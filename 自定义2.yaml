port: 0
socks-port: 0
redir-port: 0
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
profile:
  store-selected: true
  store-fake-ip: true

# 动态节点管理
proxy-providers:
  freenodes:
    type: http
    url: "https://github.com/cxddgtb/cxddzy/raw/refs/heads/master/list.meta.yml"
    interval: 43200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600
      timeout: 5000
    path: ./proxy/freenodes.yaml

# ==================== 修复后的代理组系统 ====================
proxy-groups:

  # ========== 主控制系统 ==========
  - name: 🎮 控制中心
    type: select
    proxies:
      - 🚀 性能模式
      - 🎬 影音模式
      - ⚡ 游戏模式
      - 💼 办公模式
      - 🛡️ 安全模式
      - 🎯 自动选择
      - 📈 负载均衡
      - 🚀 手动切换

  # ========== 核心模式组 ==========
  - name: 🚀 性能模式
    type: select
    proxies:
      - 🎯 自动选择
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 📈 负载均衡

  - name: 🎬 影音模式
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🎯 自动选择
      - 🇰🇷 韩国节点

  - name: ⚡ 游戏模式
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🎯 自动选择

  - name: 💼 办公模式
    type: select
    proxies:
      - 🎯 自动选择
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点

  - name: 🛡️ 安全模式
    type: select
    proxies:
      - 🇨🇭 瑞士节点
      - 🇸🇪 瑞典节点
      - 🇩🇪 德国节点
      - 🎯 自动选择
      - 🇳🇱 荷兰节点

  # ========== 基础功能组 ==========
  - name: 🎯 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    use: [freenodes]

  - name: 📈 负载均衡
    type: load-balance
    url: http://www.gstatic.com/generate_204
    interval: 300
    strategy: consistent-hashing
    use: [freenodes]

  - name: 🚀 手动切换
    type: select
    use: [freenodes]

  # ========== 地区节点组 ==========
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇭🇰|HK|香港|HONG|HKG"

  - name: 🇨🇳 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇨🇳|TW|台湾|TAIWAN"

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇺🇸|US|美国|USA"

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇯🇵|JP|日本|JAPAN"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇰🇷|KR|韩国|KOREA"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇸🇬|SG|新加坡|SINGAPORE"

  - name: 🇨🇭 瑞士节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇨🇭|CH|瑞士|SWISS"

  - name: 🇸🇪 瑞典节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇸🇪|SE|瑞典|SWEDEN"

  - name: 🇩🇪 德国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇩🇪|DE|德国|GERMANY"

  - name: 🇳🇱 荷兰节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇳🇱|NL|荷兰|NETHERLANDS"

  - name: 🇨🇦 加拿大节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇨🇦|CA|加拿大|CANADA"

  - name: 🇬🇧 英国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "🇬🇧|UK|英国|UNITED KINGDOM"

  # ========== 功能服务组 ==========
  - name: 🛡️ 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🎯 自动选择

  - name: ☁️ 开发服务
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🇩🇪 德国节点
      - 🎯 自动选择

  - name: 💬 社交媒体
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🎯 自动选择

  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🎯 自动选择
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - DIRECT

  - name: 🌐 国际网络
    type: select
    proxies:
      - 🎯 自动选择
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇩🇪 德国节点

  - name: 🇨🇳 国内直连
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点]

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🎯 自动选择
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - DIRECT

