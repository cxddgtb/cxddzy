# ==================== 终极规则优先级 ====================
rules:
  # 第一优先级：安全防护
  - RULE-SET,reject,🛡️ 广告拦截
  - RULE-SET,malware,🚫 恶意软件拦截
  - RULE-SET,tracking,📵 跟踪保护
  
  # 第二优先级：网络基础
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT
  
  # 第三优先级：国内直连
  - RULE-SET,direct,DIRECT
  - RULE-SET,china,DIRECT
  - RULE-SET,cncidr,DIRECT
  
  # 第四优先级：下载优化
  - RULE-SET,download,DIRECT
  
  # 第五优先级：国内平台优化
  - RULE-SET,bilibili,🇨🇳 国内直连
  - RULE-SET,tencent,🇨🇳 国内直连
  - RULE-SET,alibaba,🇨🇳 国内直连
  - RULE-SET,baidu,🇨🇳 国内直连
  
