  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,direct,DIRECT
  
  # 国内服务
  - RULE-SET,bilibili,🇨🇳 国内直连
  
  # AI服务
  - RULE-SET,openai,🤖 AI服务
  
  # 流媒体服务
  - RULE-SET,netflix,🎬 流媒体
  - RULE-SET,youtube,🎬 流媒体
  
  # 国际服务
  - RULE-SET,apple,🍎 苹果服务
  - RULE-SET,microsoft,☁️ 开发服务
  - RULE-SET,google,🌐 国际网络
  - RULE-SET,github,☁️ 开发服务
  - RULE-SET,twitter,💬 社交媒体
  - RULE-SET,instagram,💬 社交媒体
  - RULE-SET,telegram,💬 社交媒体
  
  # 网络基础
  - RULE-SET,cncidr,DIRECT
  - RULE-SET,proxy,🌐 国际网络
  
  # 最终规则
  - GEOIP,CN,🇨🇳 国内直连
  - GEOIP,PRIVATE,DIRECT
  - MATCH,🚀 节点选择
