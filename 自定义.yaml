  - RULE-SET,reject,🛡️ 广告拦截
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,direct,DIRECT
  
  # 国内服务 - 直连优化
  - RULE-SET,tencent,🇨🇳 国内直连
  - RULE-SET,alibaba,🇨🇳 国内直连
  - RULE-SET,bilibili,🇨🇳 国内直连
  
  # AI服务 - 优先处理
  - RULE-SET,openai,🤖 AI服务
  - RULE-SET,bing,🤖 AI服务
  - RULE-SET,bard,🤖 AI服务
  
  # 流媒体服务
  - RULE-SET,netflix,🎬 流媒体
  - RULE-SET,disney,🎬 流媒体
  - RULE-SET,spotify,🎬 流媒体
  - RULE-SET,youtube,🎬 流媒体
  
  # 游戏服务
  - RULE-SET,steam,🎮 游戏加速
  - RULE-SET,epic,🎮 游戏加速
  
  # 国际服务
