port: 0
socks-port: 0
redir-port: 0
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
profile:
  store-selected: true
  store-fake-ip: true

# 动态节点管理
proxy-providers:
  freenodes:
    type: http
    url: "https://raw.githubusercontent.com/free18/v2ray/main/c.yaml"
    interval: 43200
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600
      timeout: 5000
    path: ./proxy/freenodes.yaml

# 修正后的策略组 - 确保所有引用都存在
proxy-groups:
  # 主选择组 - 修正引用问题
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 📈 负载均衡
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - DIRECT

  # 基础功能组
  - name: 🚀 手动切换
    type: select
    use: [freenodes]

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 150
    lazy: true
    use: [freenodes]

  - name: 📈 负载均衡
    type: load-balance
    url: http://www.gstatic.com/generate_204
    interval: 900
    strategy: consistent-hashing
    use: [freenodes]

  # 地区节点组
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇭🇰|HK|香港|HONG|HKG"

  - name: 🇨🇳 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇨🇳|TW|台湾|TAIWAN"

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇺🇸|US|美国|USA"

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇯🇵|JP|日本|JAPAN"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇰🇷|KR|韩国|KOREA"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇸🇬|SG|新加坡|SINGAPORE"

  # 功能组
  - name: 🛡️ 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - ♻️ 自动选择
      - DIRECT

  - name: 🎬 流媒体
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - ♻️ 自动选择

  - name: 🎮 游戏加速
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择

  - name: 🇨🇳 国内直连
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点]

  - name: 🍎 苹果服务
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇺🇸 美国节点, DIRECT]

  - name: 🌐 国际网络
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点]

  - name: 💬 社交媒体
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇭🇰 香港节点]

  - name: ☁️ 开发服务
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点]

