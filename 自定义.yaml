port: 0
socks-port: 0
redir-port: 0
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
# 开启流量统计，用于分析使用模式
profile:
  store-selected: true
  store-fake-ip: true

# 动态节点管理 - 支持自动更新和健康检查
proxy-providers:
  freenodes:
    type: http
    url: "https://raw.githubusercontent.com/free18/v2ray/main/c.yaml"
    interval: 43200  # 12小时更新一次
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600  # 10分钟检查一次
      timeout: 5000
    path: ./proxy/freenodes.yaml
    # 节点过滤器 - 自动过滤无效节点
    filter: "^(?!.*(过期|维护|测试)).*$"

# 增强型策略组 - 更多智能选项
proxy-groups:
  # 主切换组
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎯 全局直连
      - 🎯 全局代理
      - 🚀 手动切换
      - 📈 负载均衡
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点  
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - DIRECT

  # 智能策略组
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 150  # 容忍延迟差
    lazy: true
    use: [freenodes]
    disable-udp: false

  - name: 📈 负载均衡
    type: load-balance
    url: http://www.gstatic.com/generate_204
    interval: 900
    strategy: consistent-hashing
    use: [freenodes]

  - name: 🎯 全局直连
    type: select
    proxies: [DIRECT]

  - name: 🎯 全局代理
    type: select
    proxies: [♻️ 自动选择]

  # 地区节点组 - 自动过滤
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇭🇰|HK|香港|HONG|HKG"

  - name: 🇨🇳 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇨🇳|TW|台湾|TAIWAN"

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇺🇸|US|美国|USA|United States"

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇯🇵|JP|日本|JAPAN"

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇰🇷|KR|韩国|KOREA"

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    use: [freenodes]
    filter: "🇸🇬|SG|新加坡|SINGAPORE"

  # 广告拦截
  - name: 🛡️ 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  # AI服务组 - 优化访问
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🚀 AI专用
      - 🇺🇸 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - ♻️ 自动选择
      - DIRECT

  - name: 🚀 AI专用
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300  # 5分钟检查一次，AI服务需要低延迟
    use: [freenodes]
    filter: "GPT|AI|专用|优化"

  # 流媒体服务组
  - name: 🎬 流媒体
    type: select
    proxies:
      - 📺 奈飞专用
      - 🎥 迪士尼专用
      - 📹 油管加速
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - ♻️ 自动选择

  - name: 📺 奈飞专用
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    use: [freenodes]
    filter: "NF|NETFLIX|奈飞|解锁"

  - name: 🎥 迪士尼专用
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    use: [freenodes]
    filter: "DISNEY|迪士尼|解锁"

  - name: 📹 油管加速
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    use: [freenodes]
    filter: "YOUTUBE|油管|4K|8K|视频"

  # 游戏加速组
  - name: 🎮 游戏加速
    type: select
    proxies:
      - 🕹️ 游戏专用
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择

  - name: 🕹️ 游戏专用
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [freenodes]
    filter: "GAME|游戏|加速|低延迟"

  # 国内服务优化
  - name: 🇨🇳 国内直连
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点]

  # 其他服务组
  - name: 🍎 苹果服务
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇺🇸 美国节点, 🇯🇵 日本节点, DIRECT]

  - name: 🌐 国际网络
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点]

  - name: 💬 社交媒体
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇭🇰 香港节点]

  - name: ☁️ 开发服务
    type: select
    proxies: [♻️ 自动选择, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点]

