    HTTP:
      override-destination: true
      ports:
      - 80
      - 8080-8880
      - 8000
      - 8081
      - 8090
    QUIC:
      ports:
      - 443
      - 8443
    TLS:
      ports:
      - 443
      - 8443
      - 465
      - 587
      - 993
      - 995
tcp-concurrent: true
unified-delay: true
